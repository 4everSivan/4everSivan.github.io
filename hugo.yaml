baseURL: https://4everSivan.github.io/
title: SivanHub
languageCode: zh-CN
defaultContentLanguage: zh-cn
enableRobotsTXT: true
enableGitInfo: false

languages:
  zh-cn:
    languageCode: zh-CN
    languageName: 简体中文
    title: SivanHub
    weight: 1

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderHooks:
      link:
        useEmbedded: always
    renderer:
      unsafe: false
  highlight:
    noClasses: false

disableKinds:
  - taxonomy
  - term

menu:
  main:
    - name: 文档
      pageRef: /docs
      weight: 1
    - name: 搜索
      weight: 2
      params:
        type: search
    - name: GitHub
      url: https://github.com/4everSivan/4everSivan.github.io
      weight: 3
      params:
        icon: github

params:
  description: 从本地学习文档安全同步生成的静态知识库
  externalLinkDecoration: true
  navbar:
    displayTitle: true
    displayLogo: false
  search:
    enable: true
    type: flexsearch
    flexsearch:
      js: vendor/flexsearch.bundle.min.js
  mermaid:
    js: vendor/mermaid.min.js
  theme:
    default: dark
    displayToggle: false
  page:
    width: normal
    displayPagination: true
  footer:
    displayCopyright: true
    displayPoweredBy: true
  editURL:
    enable: false
